name: Deploy na VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy na hwhackathon.cz
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Deploy přes rsync (SSH)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.git*' --exclude='.github'
          path: ./
          remote_path: /var/www/hwhackathon.cz/
          remote_host: 37.205.13.209
          remote_user: naxera
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Nastavení oprávnění
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 37.205.13.209
          username: naxera
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            chown -R www-data:www-data /var/www/hwhackathon.cz
            chmod -R 755 /var/www/hwhackathon.cz
